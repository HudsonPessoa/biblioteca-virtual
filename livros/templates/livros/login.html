<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Virtual</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        .login-card{
            background: white;
            border-radius: 25px;
            padding: 50px;
            width: 100%;
            max-width: 500px;
        }

        .titulo{
            font-size: 32px;
            font-weight: bold;
            color: #0f172a;
        }

        .subtitulo{
            color: gray;
        }

        .btn-custom{
            border-radius: 12px;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
        }

    </style>
</head>
<body>

<div class="login-card shadow-lg text-center">

    <h1 class="titulo mb-3">
        Biblioteca Virtual
    </h1>

    <p class="subtitulo mb-5">
        Escolha como deseja acessar o sistema
    </p>

    <div class="d-grid gap-3">

        <a href="{% url 'admin_login' %}"
           class="btn btn-dark btn-custom">
            Login Administrador
        </a>

        <a href="{% url 'home' %}"
           class="btn btn-success btn-custom">
            Entrar como Visitante
        </a>

    </div>

</div>

</body>
</html>
