<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-login{
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            border: none;
        }

        .btn{
            border-radius: 10px;
            padding: 10px;
        }

    </style>
</head>
<body>

<div class="card card-login shadow-lg p-4">

    <h2 class="text-center mb-4">
        🔐 Login Administrador
    </h2>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">
            <label>Usuário</label>
            <input type="text"
                   name="username"
                   class="form-control">
        </div>

        <div class="mb-4">
            <label>Senha</label>
            <input type="password"
                   name="password"
                   class="form-control">
        </div>

        <button class="btn btn-dark w-100">
            Entrar
        </button>

        <a href="{% url 'login_page' %}"
           class="btn btn-secondary w-100 mt-2">
            Voltar
        </a>

    </form>

</div>

</body>
</html>
