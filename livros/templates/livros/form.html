<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Livro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg, #1e293b, #0f172a);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .card-form{
            border: none;
            border-radius: 20px;
            overflow: hidden;
        }

        .card-header{
            background-color: #198754;
            color: white;
            padding: 25px;
        }

        .form-control,
        .form-select{
            border-radius: 10px;
            padding: 10px;
        }

        .btn-success{
            border-radius: 10px;
            padding: 10px 20px;
        }

        .btn-secondary{
            border-radius: 10px;
            padding: 10px 20px;
        }

        label{
            font-weight: 600;
            margin-bottom: 5px;
        }

    </style>

</head>
<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card card-form shadow-lg">

                <div class="card-header">
                    <h2 class="mb-0">
                        📚 Cadastro de Livro
                    </h2>
                </div>

                <div class="card-body p-4">

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">
                            <label>Título</label>
                            {{ form.titulo }}
                        </div>

                        <div class="mb-3">
                            <label>Descrição</label>
                            {{ form.descricao }}
                        </div>

                        <div class="mb-3">
                            <label>Ano de Publicação</label>
                            {{ form.ano_publicacao }}
                        </div>

                        <div class="mb-3">
                            <label>Quantidade</label>
                            {{ form.quantidade }}
                        </div>

                        <div class="mb-3">
                            <label>Autor</label>
                            {{ form.autor }}
                        </div>

                        <div class="mb-4">
                            <label>Categoria</label>
                            {{ form.categoria }}
                        </div>

                        <div class="d-flex gap-2">

                            <button type="submit"
                                    class="btn btn-success">
                                Salvar Livro
                            </button>

                            <a href="/"
                               class="btn btn-secondary">
                                Voltar
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
